services:
  seeder:
    build: .
    container_name: ips-app-seeder
    command: python -m ips_app.main seeder
    env_file:
      - ./.env
    volumes:
      - ./src:/app
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    restart: "no"

  backend:
    build: .
    container_name: ips-app-backend
    ports:
      - "${DOCKER_PORT_BACKEND:-50002}:8000"
    env_file:
      - ./.env
    volumes:
      - ./src:/app
    depends_on:
      mongo:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully
    restart: unless-stopped

  mongo:
    image: mongo:8
    container_name: ips-app-mongo
    entrypoint:
      - /bin/bash
      - -c
      - |
        if [ ! -f /data/db/mongodb.key ]; then
          openssl rand -base64 756 > /data/db/mongodb.key
          chmod 400 /data/db/mongodb.key
        fi
        exec docker-entrypoint.sh "$$@"
    command:
      [
        "mongod",
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--keyFile",
        "/data/db/mongodb.key",
      ]
    ports:
      - "${DOCKER_PORT_MONGO:-50003}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DOCKER_MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DOCKER_MONGO_PASSWORD}
    volumes:
      - ips_app_mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--username",
          "${DOCKER_MONGO_USERNAME}",
          "--password",
          "${DOCKER_MONGO_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mongo-init:
    image: mongo:8
    container_name: ips-app-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint:
      - mongosh
      - --host
      - mongo:27017
      - --username
      - ${DOCKER_MONGO_USERNAME}
      - --password
      - ${DOCKER_MONGO_PASSWORD}
      - --authenticationDatabase
      - admin
      - --eval
      - |
        try {
          if (rs.status().ok) {
            console.log('Replica set already initialized');
          }
        } catch (e) {
          console.log('Initializing replica set...');
          rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]});
        }

volumes:
  ips_app_mongo_data:

networks:
  default:
    name: ips-app-network
