[env]
; Bump this on every firmware release. Keep it in sync with the "version" field in
; firmware/scripts/upload_firmware.config.json when uploading that build to the backend.
build_flags = -D UWB_FIRMWARE_VERSION=\"1.0.0-stg.1\"

[env:esp32dev-16mb]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
board_upload.flash_size = 16MB
board_build.partitions = partitions/16MB.csv
board_build.filesystem = littlefs
extra_scripts = pre:scripts/load_env.py
build_flags = ${env.build_flags} -D UWB_FIRMWARE_BOARD_VARIANT=\"${PIOENV}\"
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    links2004/WebSockets@^2.4.0

[env:esp32dev-8mb]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
board_upload.flash_size = 8MB
board_build.partitions = partitions/8MB.csv
board_build.filesystem = littlefs
extra_scripts = pre:scripts/load_env.py
build_flags = ${env.build_flags} -D UWB_FIRMWARE_BOARD_VARIANT=\"${PIOENV}\"
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    links2004/WebSockets@^2.4.0
